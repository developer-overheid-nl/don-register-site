name: Deploy to Test

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

env:
  API_IMAGE_NAME: ghcr.io/developer-overheid-nl/don-register-site
  OSS_IMAGE_NAME: ghcr.io/developer-overheid-nl/don-register-oss-site
  INFRA_REPO: ${{ vars.INFRA_REPO }}
  KUSTOMIZE_PATH_API: ${{ vars.KUSTOMIZE_PATH_API }}
  KUSTOMIZE_PATH_OSS: ${{ vars.KUSTOMIZE_PATH_OSS }}
  DEPLOY_ENV: test

jobs:
  check-keyword:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Check commit message for deploy keyword
        id: check
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Keyword: [deploy-test] anywhere in de commit message
          # Voorbeeld: "feat: nieuwe feature [deploy-test]"
          if echo "$COMMIT_MESSAGE" | grep -qi "\[deploy-test\]"; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "Deploy keyword gevonden in commit message."
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "Geen deploy keyword gevonden, sla deploy over."
          fi

  build-and-push:
    needs: check-keyword
    if: |
      needs.check-keyword.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          target: runtime-api
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:test
            ${{ env.API_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push OSS image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          target: runtime-oss
          push: true
          tags: |
            ${{ env.OSS_IMAGE_NAME }}:test
            ${{ env.OSS_IMAGE_NAME }}:${{ github.sha }}

  update-infra-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Parse infra repository
        id: infra-repo
        run: |
          INFRA_REPO="${{ env.INFRA_REPO }}"

          if [[ -z "$INFRA_REPO" || "$INFRA_REPO" != */* ]]; then
            echo "INFRA_REPO moet de vorm owner/repo hebben, huidige waarde: '$INFRA_REPO'" >&2
            exit 1
          fi

          echo "owner=${INFRA_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "repo=${INFRA_REPO#*/}" >> "$GITHUB_OUTPUT"

      - name: Genereer app token (Release proces app)
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        with:
          app-id: ${{ secrets.RELEASE_PROCES_APP_ID }}
          private-key: ${{ secrets.RELEASE_PROCES_APP_PRIVATE_KEY }}
          owner: ${{ steps.infra-repo.outputs.owner }}
          repositories: ${{ steps.infra-repo.outputs.repo }}

      - name: Checkout don-infra
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update image tags in test overlays
        run: |
          API_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_API }}${{ env.DEPLOY_ENV }}/kustomization.yaml"
          OSS_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_OSS }}${{ env.DEPLOY_ENV }}/kustomization.yaml"

          yq e '(.images[] | select(.newName == "${{ env.API_IMAGE_NAME }}")).newTag = "${{ github.sha }}"' \
            -i "$API_KUSTOMIZATION_FILE"

          yq e '(.images[] | select(.newName == "${{ env.OSS_IMAGE_NAME }}")).newTag = "${{ github.sha }}"' \
            -i "$OSS_KUSTOMIZATION_FILE"

      - name: Commit en push naar don-infra
        run: |
          API_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_API }}${{ env.DEPLOY_ENV }}/kustomization.yaml"
          OSS_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_OSS }}${{ env.DEPLOY_ENV }}/kustomization.yaml"

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add "$API_KUSTOMIZATION_FILE" "$OSS_KUSTOMIZATION_FILE"
          git commit -m "test: don-register-site → ${{ github.sha }}

          Branch: ${{ github.ref_name }}
          Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          git push
