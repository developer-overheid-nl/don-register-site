name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  API_IMAGE_NAME: ghcr.io/developer-overheid-nl/don-register-site
  OSS_IMAGE_NAME: ghcr.io/developer-overheid-nl/don-register-oss-site
  INFRA_REPO: ${{ vars.INFRA_REPO }}
  KUSTOMIZE_PATH_API: ${{ vars.KUSTOMIZE_PATH_API }}
  KUSTOMIZE_PATH_OSS: ${{ vars.KUSTOMIZE_PATH_OSS }}
  DEPLOY_ENV: prod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          target: runtime-api
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:latest
            ${{ env.API_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push OSS image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          target: runtime-oss
          push: true
          tags: |
            ${{ env.OSS_IMAGE_NAME }}:latest
            ${{ env.OSS_IMAGE_NAME }}:${{ github.sha }}

  create-infra-pr:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Parse infra repository
        id: infra-repo
        run: |
          INFRA_REPO="${{ env.INFRA_REPO }}"

          if [[ -z "$INFRA_REPO" || "$INFRA_REPO" != */* ]]; then
            echo "INFRA_REPO moet de vorm owner/repo hebben, huidige waarde: '$INFRA_REPO'" >&2
            exit 1
          fi

          echo "owner=${INFRA_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "repo=${INFRA_REPO#*/}" >> "$GITHUB_OUTPUT"

      - name: Genereer app token (Release proces app)
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        with:
          app-id: ${{ secrets.RELEASE_PROCES_APP_ID }}
          private-key: ${{ secrets.RELEASE_PROCES_APP_PRIVATE_KEY }}
          owner: ${{ steps.infra-repo.outputs.owner }}
          repositories: ${{ steps.infra-repo.outputs.repo }}

      - name: Checkout don-infra
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Maak release branch aan in don-infra
        id: branch
        run: |
          BRANCH="release/don-register-site-${{ github.sha }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"

      - name: Update image tags in prod overlays
        run: |
          API_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_API }}${{ env.DEPLOY_ENV }}/kustomization.yaml"
          OSS_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_OSS }}${{ env.DEPLOY_ENV }}/kustomization.yaml"

          yq e '(.images[] | select(.newName == "${{ env.API_IMAGE_NAME }}")).newTag = "${{ github.sha }}"' \
            -i "$API_KUSTOMIZATION_FILE"

          yq e '(.images[] | select(.newName == "${{ env.OSS_IMAGE_NAME }}")).newTag = "${{ github.sha }}"' \
            -i "$OSS_KUSTOMIZATION_FILE"

      - name: Commit en push release branch
        run: |
          API_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_API }}${{ env.DEPLOY_ENV }}/kustomization.yaml"
          OSS_KUSTOMIZATION_FILE="${{ env.KUSTOMIZE_PATH_OSS }}${{ env.DEPLOY_ENV }}/kustomization.yaml"

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add "$API_KUSTOMIZATION_FILE" "$OSS_KUSTOMIZATION_FILE"
          git commit -m "release: don-register-site → ${{ github.sha }}

          Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Maak PR aan in don-infra
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --repo "${{ env.INFRA_REPO }}" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "Release: don-register-site → ${GITHUB_SHA::7}" \
            --body "## don-register-site productie deploy

          **API image:** \`${{ env.API_IMAGE_NAME }}:${{ github.sha }}\`
          **OSS image:** \`${{ env.OSS_IMAGE_NAME }}:${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}

          Merge deze PR om de nieuwe versie naar productie te deployen."
