name: Build

on:
  push:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name"
        required: true
        default: "main"

env:
  API_IMAGE_NAME: ghcr.io/developer-overheid-nl/don-register-site
  OSS_IMAGE_NAME: ghcr.io/developer-overheid-nl/don-register-oss-site

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PIWIK_PRO_SITE_ID: cypress
      ALTCHA_HMAC_KEY: cypress
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        uses: cypress-io/github-action@fa4a118725a8f001170d49631ea89e5d66fee626 # v7
        with:
          runTests: false

      - name: Run unit tests
        run: pnpm test -- run

      - name: Run API Cypress tests
        uses: cypress-io/github-action@fa4a118725a8f001170d49631ea89e5d66fee626 # v7
        with:
          install: false
          start: pnpm --filter @developer-overheid-nl/api-register dev --host 127.0.0.1 --port 4321
          wait-on: "http://localhost:4321"
          wait-on-timeout: 120
          config: baseUrl=http://localhost:4321
          spec: "cypress/e2e/api/**/*.cy.{js,jsx,ts,tsx}"

      - name: Run OSS Cypress tests
        uses: cypress-io/github-action@fa4a118725a8f001170d49631ea89e5d66fee626 # v7
        with:
          install: false
          start: pnpm --filter @developer-overheid-nl/oss-register dev --host 127.0.0.1 --port 4322
          wait-on: "http://localhost:4322"
          wait-on-timeout: 120
          config: baseUrl=http://localhost:4322
          spec: "cypress/e2e/oss/**/*.cy.{js,jsx,ts,tsx}"

  build:
    environment: production
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          target: runtime-api
          tags: |
            ${{ env.API_IMAGE_NAME }}:latest
            ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          outputs: type=docker,dest=${{ runner.temp }}/api-image.tar

      - name: Build OSS image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          target: runtime-oss
          tags: |
            ${{ env.OSS_IMAGE_NAME }}:latest
            ${{ env.OSS_IMAGE_NAME }}:${{ github.sha }}
          outputs: type=docker,dest=${{ runner.temp }}/oss-image.tar

      - name: Upload API image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-image
          path: ${{ runner.temp }}/api-image.tar
          retention-days: 1

      - name: Upload OSS image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oss-image
          path: ${{ runner.temp }}/oss-image.tar
          retention-days: 1

  publish:
    if: |
      github.repository == 'developer-overheid-nl/don-register-site' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download API image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: api-image
          path: ${{ runner.temp }}/api-image

      - name: Download OSS image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: oss-image
          path: ${{ runner.temp }}/oss-image

      - name: Load images
        run: |
          docker load --input ${{ runner.temp }}/api-image/api-image.tar
          docker load --input ${{ runner.temp }}/oss-image/oss-image.tar

      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push --all-tags ${{ env.API_IMAGE_NAME }}
          docker push --all-tags ${{ env.OSS_IMAGE_NAME }}
